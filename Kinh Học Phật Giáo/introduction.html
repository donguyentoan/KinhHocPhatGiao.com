<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phụng Sự Nhân Sinh - Nhập Pháp Danh</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Noto+Serif+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>

<body> 
    <div class="min-h-screen flex items-center justify-center p-2 px-3 bg-[radial-gradient(circle,_#fff9e6_0%,_#f7e8ad_100%)] font-['Noto_Serif_Display']">

        <div class="flex flex-col md:flex-row w-full  bg-white/40 backdrop-blur-md rounded-[2rem] shadow-2xl overflow-hidden border border-white/50">
            
            <div class="md:w-2/3 p-4 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-amber-200/50">
                
                <div class="relative mb-6">
                    <img class="h-48 md:h-64 mx-auto rounded-full drop-shadow-[0_0_20px_rgba(255,215,0,0.3)] hover:drop-shadow-[0_0_35px_rgba(255,215,0,0.6)] transition-all duration-500 hover:scale-105"
                        src="https://www.daophatngaynay.com/buddha-moi.gif" alt="Đức Phật">
                </div>

                <div class="text-center space-y-4">
                    <h1 class="font-['Dancing_Script'] text-5xl md:text-6xl text-amber-700 leading-tight">
                        Phụng sự nhân sinh
                    </h1>
                    
                    <div class="h-[1px] w-32 mx-auto bg-gradient-to-r from-transparent via-amber-700 to-transparent my-4"></div>
                    
                    <p class="text-xl md:text-2xl text-gray-700 italic">
                        Tốt đời – đẹp đạo
                    </p>
                    <p class="font-['Dancing_Script'] text-3xl md:text-4xl text-amber-900">
                        Hộ quốc <span class="text-amber-500 mx-2">•</span> An dân
                    </p>
                </div>

                <div class="mt-8 opacity-60">
                    <img class="mx-auto w-14" src="https://www.daophatngaynay.com/logo_tron.gif" alt="Logo">
                </div>
            </div>

            <div class="md:w-1/3 p-8 md:p-12 bg-white/20 flex flex-col justify-center">
                <div class="space-y-8">
                    <div class="text-center md:text-left">
                        <h4 class="text-amber-800 font-bold tracking-[0.2em] text-lg uppercase mb-2">Pháp Danh Phật Tử</h4>
                        <p class="text-sm text-amber-900/60 italic">Vui lòng nhập pháp danh của bạn</p>
                    </div>

                    <div class="space-y-4">
                        <input type="text" 
                            placeholder="Ví dụ: Chúc An..."
                            class="w-full px-5 py-2 rounded-xl bg-white/60 border border-amber-200 text-amber-900 placeholder-amber-900/30 transition-all text-lg focus:outline-none focus:border-amber-700 focus:ring-4 focus:ring-amber-700/10">
                        
                        <div class="flex flex-col gap-3">
                            <a href="/index.html" class="text-center w-full py-2 bg-amber-700 hover:bg-amber-800 text-white rounded-xl font-bold transition-all shadow-lg shadow-amber-900/20 active:scale-[0.98]">
                                LƯU THÔNG TIN
                            </a>
                            
                            <button class="w-full py-2 bg-transparent border border-amber-700/30 text-amber-800 hover:bg-amber-700/5 rounded-xl font-medium transition-all active:scale-[0.98]">
                                Để sau
                            </button>
                        </div>
                    </div>

                    <div class="pt-8 text-center">
                        <p class="text-[11px] text-amber-800/40 leading-relaxed uppercase tracking-[0.3em]">
                            "Tâm an vạn sự an"
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
